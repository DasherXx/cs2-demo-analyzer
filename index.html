<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CS2 Demo — magazyn</title>
<style>
  :root{
    --bg:#11131a;--panel:#181b24;--panel2:#1f2330;--line:#2a2f3e;
    --text:#e7e9ef;--muted:#8b90a0;--accent:#5b7cff;--good:#3ecf8e;
    --warn:#e0a23c;--err:#e05c5c;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5}
  .wrap{max-width:700px;margin:0 auto;padding:28px 18px 80px}
  header{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  h1{font-size:20px;font-weight:600;margin:0}
  .tag{font-family:var(--mono);font-size:11px;color:var(--accent);border:1px solid var(--line);padding:2px 7px;border-radius:6px}
  .sub{color:var(--muted);font-size:13px;margin:0 0 22px}

  /* upload */
  .bay{border:1.5px dashed var(--line);border-radius:14px;background:var(--panel);
       padding:30px 20px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s}
  .bay:hover,.bay.drag{border-color:var(--accent);background:var(--panel2)}
  .bay strong{display:block;font-size:15px;margin-bottom:4px}
  .bay span{color:var(--muted);font-size:13px}
  input[type=file]{display:none}
  .status{min-height:20px;margin:12px 2px;font-size:13px;font-family:var(--mono)}
  .status.ok{color:var(--good)}.status.err{color:var(--err)}.status.busy{color:var(--accent)}

  /* lista */
  .head{display:flex;justify-content:space-between;align-items:center;margin:28px 2px 12px}
  .head h2{font-size:13px;font-weight:600;margin:0;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .reload{background:none;border:1px solid var(--line);color:var(--muted);font-size:12px;
          padding:5px 11px;border-radius:7px;cursor:pointer;font-family:var(--mono)}
  .reload:hover{color:var(--text);border-color:var(--accent)}

  /* karta dema */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px}
  .card .name{font-size:14px;font-weight:500;word-break:break-all}
  .meta{display:flex;flex-wrap:wrap;gap:5px 14px;margin:8px 0;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .pill{padding:2px 8px;border-radius:5px;font-size:11px;font-family:var(--mono);font-weight:600}
  .pill.cs2{background:#1a2a1a;color:var(--good)}.pill.pending{background:#1a1a2a;color:var(--accent)}
  .pill.running{background:#1a1a2a;color:var(--accent);animation:pulse 1s infinite}
  .pill.done{background:#1a2a1a;color:var(--good)}.pill.error{background:#2a1a1a;color:var(--err)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .btn{font-family:var(--mono);font-size:12px;text-decoration:none;border:1px solid var(--line);
       color:var(--text);background:none;padding:6px 12px;border-radius:7px;cursor:pointer}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.primary{border-color:var(--accent);color:var(--accent)}
  .btn.primary:hover{background:var(--accent);color:#000}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  /* panel raportu */
  .report{margin-top:12px;border-top:1px solid var(--line);padding-top:12px;display:none}
  .report.open{display:block}
  .report h3{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:0 0 10px}
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
  .pcard{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:11px 13px;cursor:pointer;transition:border-color .15s,transform .1s}
  .pcard:hover{border-color:var(--accent);transform:translateY(-1px)}
  .pcard .pname{font-weight:600;font-size:14px;word-break:break-all}
  .pcard .pstat{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px}
  .statgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:8px 0 18px}
  .statbox{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px 4px;text-align:center}
  .statbox .v{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--text)}
  .statbox .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-top:3px}
  .back{margin-bottom:12px}
  .finding{display:flex;gap:12px;background:var(--panel2);border:1px solid var(--line);
           border-left-width:3px;border-radius:9px;padding:12px 14px;margin-bottom:9px}
  .finding.warn{border-left-color:var(--warn)}
  .finding.bad{border-left-color:var(--err)}
  .finding.ok{border-left-color:var(--good)}
  .finding .fval{font-family:var(--mono);font-size:22px;font-weight:700;min-width:46px;text-align:center}
  .finding.warn .fval{color:var(--warn)}.finding.bad .fval{color:var(--err)}.finding.ok .fval{color:var(--good)}
  .finding .fbody{flex:1}
  .finding .ftitle{font-size:14px;font-weight:600;margin-bottom:2px}
  .finding .ftip{font-size:12px;color:var(--muted);line-height:1.45}
  .ctag{display:inline-block;font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:4px;
        background:#2a1a1a;color:var(--warn);margin:0 3px 2px 0}
  .dctx{font-size:12px;padding:7px 0;border-bottom:1px solid #1e2230}
  .dctx:last-child{border-bottom:none}
  .dctx .dwhere{font-family:var(--mono);color:var(--muted)}
  .spot-net-neg{color:var(--err)}.spot-net-pos{color:var(--good)}
  .scoreboard td{padding:9px 8px 9px 0}
  .prow{cursor:pointer;transition:background .12s}
  .prow:hover{background:var(--panel2)}
  .prow .pn{font-weight:600;font-family:var(--sans)}
  .prow .arrow{color:var(--muted);text-align:right;font-size:18px}
  .prow:hover .arrow{color:var(--accent)}
  /* Scoreboard w stylu CS2 */
  .team{border-radius:10px;overflow:hidden;border:1px solid var(--line);margin-bottom:14px}
  .team-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;font-weight:700}
  .team-head .tname{font-size:14px;letter-spacing:.03em}
  .team-head .tscore{font-family:var(--mono);font-size:22px}
  .team.ct .team-head{background:linear-gradient(90deg,rgba(91,157,217,.22),transparent);border-bottom:2px solid #5b9dd9}
  .team.ct .team-head .tscore{color:#7db8ec}
  .team.t  .team-head{background:linear-gradient(90deg,rgba(217,164,65,.22),transparent);border-bottom:2px solid #d9a441}
  .team.t  .team-head .tscore{color:#e6bd6a}
  table.sb{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
  table.sb th{color:var(--muted);text-align:center;font-weight:500;padding:7px 6px;border-bottom:1px solid var(--line)}
  table.sb th.left,table.sb td.left{text-align:left}
  table.sb td{text-align:center;padding:9px 6px;border-bottom:1px solid #1e2230}
  table.sb tr:last-child td{border-bottom:none}
  table.sb .prow:hover{background:var(--panel2)}
  table.sb .nick{font-family:var(--sans);font-weight:600}
  table.sb .arrow{color:var(--muted);font-size:16px}
  table.sb .prow:hover .arrow{color:var(--accent)}
  .sb-hint{font-size:12px;color:var(--muted);margin:0 2px 12px}
  .half{border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:12px}
  .half-head{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;
             background:var(--panel2);font-weight:600;font-size:13px}
  .half-head .half-score{font-family:var(--mono);color:var(--text)}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;vertical-align:middle}
  .dot.ct{background:#5b9dd9}.dot.t{background:#d9a441}
  .smokemap-legend{font-size:12px;color:var(--muted);margin:10px 2px 6px}
  .smokemap-img{width:100%;max-width:420px;border:1px solid var(--line);border-radius:10px;display:block}
  .crit-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.04em;color:#ff5a5a;
              border:1px solid #ff5a5a;border-radius:4px;padding:1px 5px;margin-left:6px;vertical-align:middle}
  .scoreline{font-family:var(--mono);font-size:22px;font-weight:700;margin-bottom:14px;color:var(--text)}
  .section{margin-bottom:14px}
  .section h4{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:0 0 6px}
  table{width:100%;border-collapse:collapse;font-size:12px;font-family:var(--mono)}
  th{text-align:left;color:var(--muted);padding:3px 8px 5px 0;border-bottom:1px solid var(--line)}
  td{padding:4px 8px 4px 0;border-bottom:1px solid #1e2230;vertical-align:top}
  tr:last-child td{border-bottom:none}
  .hs{color:var(--warn)}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:26px;
         border:1px dashed var(--line);border-radius:12px}
</style>
</head>
<body>
<div class="wrap">
  <header><h1>CS2 Demo — magazyn</h1><span class="tag">krok 2</span></header>
  <p class="sub">Wrzuć demo, kliknij <strong>analizuj</strong> — za kilka sekund zobaczysz rundy, zabójstwa i granaty.</p>

  <div class="bay" id="bay">
    <strong>Upuść demo tutaj</strong>
    <span>albo dotknij, żeby wybrać plik .dem</span>
    <input type="file" id="file" accept=".dem,.zst,.gz,.bz2">
  </div>
  <div class="status" id="status"></div>

  <div class="head">
    <h2>Wgrane dema</h2>
    <button class="reload" id="reload">odśwież</button>
  </div>
  <div id="list"></div>
</div>

<script>
const bay = document.getElementById('bay');
const fileInput = document.getElementById('file');
const statusEl = document.getElementById('status');
const listEl = document.getElementById('list');

function setStatus(msg, kind){ statusEl.textContent = msg; statusEl.className = 'status '+(kind||''); }
function fmtSize(b){ if(b<1048576) return (b/1024).toFixed(0)+' KB'; return (b/1048576).toFixed(1)+' MB'; }
function fmtTime(iso){ try{ return new Date(iso).toLocaleString('pl-PL'); }catch(e){ return iso; } }

async function upload(file){
  if(!file) return;
  setStatus('Wysyłam '+file.name+' …','busy');
  const fd = new FormData(); fd.append('file', file);
  try{
    const res = await fetch('/api/demos',{method:'POST',body:fd});
    if(!res.ok) throw new Error('Serwer odrzucił plik ('+res.status+')');
    const meta = await res.json();
    setStatus('Wgrano — '+meta.type+' · '+fmtSize(meta.size_bytes),'ok');
    loadList();
  }catch(err){ setStatus('Błąd: '+err.message,'err'); }
}

bay.addEventListener('click', ()=>fileInput.click());
fileInput.addEventListener('change', e=>upload(e.target.files[0]));
bay.addEventListener('dragover', e=>{ e.preventDefault(); bay.classList.add('drag'); });
bay.addEventListener('dragleave', ()=>bay.classList.remove('drag'));
bay.addEventListener('drop', e=>{ e.preventDefault(); bay.classList.remove('drag'); upload(e.dataTransfer.files[0]); });

async function startParse(id, btn){
  btn.disabled = true; btn.textContent = 'analizuję…';
  await fetch('/api/demos/'+id+'/parse', {method:'POST'});
  // Polling co 2 sekundy aż status zmieni się z running
  const interval = setInterval(async ()=>{
    const meta = await fetch('/api/demos/'+id).then(r=>r.json());
    if(meta.parse_status !== 'running'){
      clearInterval(interval);
      loadList();
    }
  }, 2000);
}

window._reports = window._reports || {};

function renderReport(report, container){
  // Lista graczy posortowana po killach — indeksy używamy w onclick (bezpieczne)
  report._players = Object.entries(report.player_stats)
    .sort((a,b)=> b[1].kills - a[1].kills)
    .map(e=>e[0]);
  report._container = container.id;
  window._reports[report.demo_id] = report;
  renderPlayerSelection(report.demo_id);
  container.classList.add('open');
}

function getCtx(demoId){
  const report = window._reports[demoId];
  return { report, container: document.getElementById(report._container) };
}

// EKRAN 1 — wybór gracza
function renderPlayerSelection(demoId){
  const { report, container } = getCtx(demoId);

  // Grupujemy graczy po stronie startowej (= drużyna, stała przez cały mecz)
  const ctTeam = [], tTeam = [];
  report._players.forEach((name, idx)=>{
    const side = report.player_stats[name].start_side;
    (side === 'ct' ? ctTeam : tTeam).push({ name, idx });
  });

  const teams = report.teams || {};

  function teamBlock(cls, label, score, members){
    const rows = members
      .sort((a,b)=> report.player_stats[b.name].kills - report.player_stats[a.name].kills)
      .map(({name, idx})=>{
        const s = report.player_stats[name];
        const kd = s.deaths ? (s.kills/s.deaths).toFixed(2) : s.kills.toFixed(2);
        const hsPct = s.kills ? Math.round(100*s.hs/s.kills) : 0;
        return `<tr class="prow" onclick="showPlayer('${demoId}', ${idx})">
          <td class="left nick">${name}</td>
          <td>${s.kills}</td>
          <td>${s.assists||0}</td>
          <td>${s.deaths}</td>
          <td>${kd}</td>
          <td>${hsPct}%</td>
          <td>${s.grenades}</td>
          <td class="arrow">›</td>
        </tr>`;
      }).join('');
    return `<div class="team ${cls}">
      <div class="team-head"><span class="tname">${label}</span><span class="tscore">${score}</span></div>
      <table class="sb">
        <tr><th class="left">Gracz</th><th>K</th><th>A</th><th>D</th><th>K/D</th><th>HS</th><th>Gran.</th><th></th></tr>
        ${rows}
      </table>
    </div>`;
  }

  // Tabela jednej połowy — obie drużyny, statystyki tylko z tej połowy
  function halfTable(label, score, half){
    const teamRows = (members, cls) => members
      .slice()
      .sort((x,y)=> report.player_stats[y.name][half].k - report.player_stats[x.name][half].k)
      .map(({name, idx})=>{
        const h = report.player_stats[name][half];
        return `<tr class="prow" onclick="showPlayer('${demoId}', ${idx})">
          <td class="left nick"><span class="dot ${cls}"></span>${name}</td>
          <td>${h.k}</td><td>${h.a}</td><td>${h.d}</td><td class="arrow">›</td>
        </tr>`;
      }).join('');
    return `<div class="half">
      <div class="half-head"><span>${label}</span><span class="half-score">${score}</span></div>
      <table class="sb">
        <tr><th class="left">Gracz</th><th>K</th><th>A</th><th>D</th><th></th></tr>
        ${teamRows(ctTeam,'ct')}${teamRows(tTeam,'t')}
      </table>
    </div>`;
  }

  const h1 = teams.h1 || {a:'?', b:'?'};
  const h2 = teams.h2 || {a:'?', b:'?'};

  container.innerHTML = `
    <h3>Scoreboard · ${report.map}</h3>
    <p class="sb-hint">Kliknij gracza, by zobaczyć jego pełną analizę.</p>
    ${teamBlock('ct', 'Drużyna A (start CT)', teams.ct_start_score ?? '?', ctTeam)}
    ${teamBlock('t',  'Drużyna B (start T)',  teams.t_start_score ?? '?', tTeam)}
    <div class="section">
      <h4>Rozbicie na połowy</h4>
      ${halfTable('1. połowa', `A ${h1.a} : ${h1.b} B`, 'h1')}
      ${halfTable('2. połowa', `A ${h2.a} : ${h2.b} B`, 'h2')}
    </div>`;
}

function showPlayer(demoId, idx){
  const { report } = getCtx(demoId);
  renderPlayerDetail(demoId, report._players[idx]);
}

function showSmokeMap(demoId, round, btn){
  const { report } = getCtx(demoId);
  const player = report._currentPlayer;
  const box = document.getElementById('smokemap-' + demoId);
  if (!box || !player) return;
  btn.textContent = 'ładuję…'; btn.disabled = true;
  const url = `/api/demos/${demoId}/smoke-map?player=${encodeURIComponent(player)}&round=${round}`;
  box.innerHTML = `<img class="smokemap-img" src="${url}" alt="mapa rzutu" onload="this.dataset.ok=1">`;
  box.scrollIntoView({behavior:'smooth', block:'nearest'});
  btn.textContent = 'mapa'; btn.disabled = false;
}

// EKRAN 2 — pojedynczy gracz
function renderPlayerDetail(demoId, name){
  const { report, container } = getCtx(demoId);
  report._currentPlayer = name;   // zapamiętujemy, żeby nie wstrzykiwać nicku do HTML
  const s = report.player_stats[name] || {kills:0,deaths:0,hs:0,grenades:0};
  const kd = s.deaths ? (s.kills/s.deaths).toFixed(2) : s.kills.toFixed(2);
  const hsPct = s.kills ? Math.round(100*s.hs/s.kills) : 0;

  const myKills  = report.kills.filter(k=> k.attacker === name);
  const myDeaths = report.kills.filter(k=> k.victim === name);
  const myNades  = report.grenades.filter(g=> g.thrower === name);

  // Granaty pogrupowane po typie
  const byType = {};
  myNades.forEach(g=>{ byType[g.type] = (byType[g.type]||0)+1; });
  const nadeSummary = Object.entries(byType).map(([t,c])=>`${t}: ${c}`).join(' · ') || 'brak';

  const killRows = myKills.map(k=>
    `<tr><td>${k.round}</td><td>${k.victim||'—'}</td><td>${k.weapon||'—'}</td><td>${k.headshot?'<span class="hs">HS</span>':''}</td></tr>`
  ).join('') || '<tr><td colspan="4" style="color:var(--muted)">brak</td></tr>';

  const deathRows = myDeaths.map(k=>
    `<tr><td>${k.round}</td><td>${k.attacker||'—'}</td><td>${k.weapon||'—'}</td></tr>`
  ).join('') || '<tr><td colspan="3" style="color:var(--muted)">brak</td></tr>';

  // ── Wnioski (silnik reguł) ──
  const f = (report.player_findings || {})[name] || {};
  const findingCards = [];

  // Reguła 1 — śmierć bez utility
  if (f.deaths_no_utility) {
    const n = f.deaths_no_utility.length;
    const sev = n >= 5 ? 'bad' : (n >= 2 ? 'warn' : 'ok');
    const rounds = f.deaths_no_utility.length ? ` (rundy: ${f.deaths_no_utility.join(', ')})` : '';
    findingCards.push(`<div class="finding ${sev}">
      <div class="fval">${n}</div>
      <div class="fbody">
        <div class="ftitle">Śmierci bez użycia granatu</div>
        <div class="ftip">Tyle razy zginąłeś nie rzucając żadnego utility w rundzie${rounds}. Granat w plecaku nic nie daje — rzucaj smoke/flasha zanim wejdziesz w starcie.</div>
      </div>
    </div>`);
  }

  // Reguła 2 — śmierć bez trade'a
  if (f.deaths_total) {
    const n = f.untraded_deaths.length;
    const sev = f.trade_rate < 40 ? 'bad' : (f.trade_rate < 60 ? 'warn' : 'ok');
    findingCards.push(`<div class="finding ${sev}">
      <div class="fval">${n}</div>
      <div class="fbody">
        <div class="ftitle">Śmierci bez trade'a — trade rate ${f.trade_rate}%</div>
        <div class="ftip">Z ${f.deaths_total} śmierci aż ${n} nie zostało pomszczonych w 5 sekund. Oznacza to, że umierasz w izolacji — trzymaj się bliżej drużyny, żeby koledzy mogli odbić Twojego zabójcę.</div>
      </div>
    </div>`);
  }

  // Reguła 3 — pierwsze starcia
  if (f.entry_kills !== undefined) {
    const attempts = f.entry_kills + f.entry_deaths;
    const sev = f.entry_deaths > f.entry_kills ? 'warn' : 'ok';
    findingCards.push(`<div class="finding ${sev}">
      <div class="fval">${f.entry_kills}–${f.entry_deaths}</div>
      <div class="fbody">
        <div class="ftitle">Pierwsze starcia rundy (otwarcia)</div>
        <div class="ftip">Wygrałeś ${f.entry_kills}, przegrałeś ${f.entry_deaths} z ${attempts} pierwszych pojedynków. ${f.entry_deaths > f.entry_kills ? 'Częściej giniesz jako pierwszy — rozważ wchodzenie z flashem lub za kolegą.' : 'Dobra skuteczność w otwarciach.'}</div>
      </div>
    </div>`);
  }

  const findingsSection = findingCards.length ? `
    <div class="section">
      <h4>Co możesz poprawić</h4>
      ${findingCards.join('')}
    </div>` : '';

  // Najgorsze miejsca (callouty)
  const spots = f.worst_spots || [];
  const spotRows = spots.map(sp=>{
    const netCls = sp.net < 0 ? 'spot-net-neg' : (sp.net > 0 ? 'spot-net-pos' : '');
    const netStr = (sp.net > 0 ? '+' : '') + sp.net;
    return `<tr><td>${sp.place}</td><td>${sp.deaths}</td><td>${sp.kills}</td><td class="${netCls}">${netStr}</td></tr>`;
  }).join('');
  const spotsSection = spots.length ? `
    <div class="section">
      <h4>Najgorsze miejsca — gdzie giniesz vs zabijasz</h4>
      <table>
        <tr><th>Miejsce</th><th>Śmierci</th><th>Kille</th><th>Bilans</th></tr>
        ${spotRows}
      </table>
    </div>` : '';

  // Śmierci z kontekstem (tagi)
  const ctx = f.death_contexts || [];
  const ctxRows = ctx.map(d=>{
    const tags = (d.tags||[]).map(t=>`<span class="ctag">${t}</span>`).join('');
    return `<div class="dctx">
      <span class="dwhere">R${d.round} · ${d.place}</span> — zabił Cię ${d.killer||'?'} (${d.weapon||'?'})<br>${tags||'<span style="color:var(--muted)">—</span>'}
    </div>`;
  }).join('');
  const ctxSection = ctx.length ? `
    <div class="section">
      <h4>Twoje śmierci w kontekście (${ctx.length})</h4>
      ${ctxRows}
    </div>` : '';

  // Celność smoke'ów wg biblioteki wzorcowej
  const offt = f.smokes_offtarget || [];
  const ont = f.smokes_ontarget || 0;
  let smokeSection = '';
  if (f.has_library) {
    const checked = ont + offt.length;
    const sev = offt.length >= 4 ? 'bad' : (offt.length >= 1 ? 'warn' : 'ok');
    const nCrit = offt.filter(o=>o.critical).length;
    const offRows = offt.map(o=>`<tr>
        <td>${o.round}</td>
        <td>${o.from||'—'}</td>
        <td>${o.target_from||'—'}${o.critical ? ' <span class="crit-badge">KRYTYCZNY</span>' : ''}</td>
        <td class="hs">${o.off_by}</td>
        <td><button class="btn" onclick="showSmokeMap('${demoId}', ${o.round}, this)">mapa</button></td>
      </tr>`).join('') || '<tr><td colspan="5" style="color:var(--good)">brak — wszystkie trafione 👌</td></tr>';
    const critTip = nCrit ? ` <b>${nCrit}</b> z nich to smoke'i krytyczne — takie, które pro kładą zawsze w to samo miejsce; tu nawet mały błąd zostawia lukę.` : '';
    smokeSection = `
    <div class="section">
      <div class="finding ${sev}">
        <div class="fval">${offt.length}</div>
        <div class="fbody">
          <div class="ftitle">Niecelne smoke'i (wg wzorców pro)</div>
          <div class="ftip">Z ${checked} smoke'ów porównanych z bazą lineupów, ${ont} trafiło w standardowy spot, a ${offt.length} wylądowało obok.${critTip} Te lineupy warto przećwiczyć.</div>
        </div>
      </div>
      ${offt.length ? `<h4>Smoke'i do poprawy</h4>
      <table>
        <tr><th>Runda</th><th>Skąd rzucał</th><th>Cel (typowo z)</th><th>Poza o</th><th></th></tr>
        ${offRows}
      </table>
      <div class="smokemap-legend">🔵 skąd rzucił · 🔴 wylądował (źle) · 🟢 powinno tu · <span style="color:#ff3b3b">🔴 cel krytyczny</span></div>
      <div id="smokemap-${demoId}"></div>` : ''}
    </div>`;
  } else if ((f.smokes_total||0) > 0) {
    smokeSection = `
    <div class="section">
      <div class="finding ok">
        <div class="fval">—</div>
        <div class="fbody">
          <div class="ftitle">Celność smoke'ów</div>
          <div class="ftip">Brak biblioteki wzorcowej dla mapy ${report.map}. Zbuduj ją z dem pro (build_library.py) dla tej mapy, żeby oceniać celność rzutów.</div>
        </div>
      </div>
    </div>`;
  }

  container.innerHTML = `
    <button class="btn back" onclick="renderPlayerSelection('${demoId}')">← wszyscy gracze</button>
    <h3>${name} · ${report.map}</h3>
    <div class="statgrid">
      <div class="statbox"><div class="v">${s.kills}</div><div class="l">Kille</div></div>
      <div class="statbox"><div class="v">${s.deaths}</div><div class="l">Śmierci</div></div>
      <div class="statbox"><div class="v">${kd}</div><div class="l">K/D</div></div>
      <div class="statbox"><div class="v">${hsPct}%</div><div class="l">HS</div></div>
      <div class="statbox"><div class="v">${s.grenades}</div><div class="l">Granaty</div></div>
    </div>
    ${findingsSection}
    ${smokeSection}
    ${spotsSection}
    ${ctxSection}

    <div class="section">
      <h4>Granaty wg typu</h4>
      <p style="font-family:var(--mono);font-size:13px;color:var(--muted);margin:0">${nadeSummary}</p>
    </div>

    <div class="section">
      <h4>Zabójstwa (${myKills.length})</h4>
      <table>
        <tr><th>Runda</th><th>Ofiara</th><th>Broń</th><th></th></tr>
        ${killRows}
      </table>
    </div>

    <div class="section">
      <h4>Śmierci (${myDeaths.length})</h4>
      <table>
        <tr><th>Runda</th><th>Zabił go</th><th>Broń</th></tr>
        ${deathRows}
      </table>
    </div>`;
}

async function toggleReport(id, btn, reportEl){
  if(reportEl.classList.contains('open')){ reportEl.classList.remove('open'); btn.textContent='pokaż raport'; return; }
  btn.textContent = 'ładuję…'; btn.disabled = true;
  try{
    const res = await fetch('/api/demos/'+id+'/report');
    if(!res.ok) throw new Error('Raport niedostępny');
    const report = await res.json();
    renderReport(report, reportEl);
    btn.textContent = 'ukryj raport';
  }catch(e){
    reportEl.innerHTML = '<p style="color:var(--err);font-size:13px">'+e.message+'</p>';
    reportEl.classList.add('open');
    btn.textContent = 'pokaż raport';
  }
  btn.disabled = false;
}

async function loadList(){
  try{
    const demos = await fetch('/api/demos').then(r=>r.json());
    if(!demos.length){ listEl.innerHTML='<div class="empty">Pusto. Wrzuć pierwsze demo powyżej.</div>'; return; }
    listEl.innerHTML = demos.map(d=>{
      const status = d.parse_status || 'pending';
      const statusLabel = {pending:'oczekuje',running:'analizuję…',done:'przeanalizowane',error:'błąd'}[status]||status;
      const canParse = status==='pending'||status==='error';
      const canReport = status==='done';
      const extra = d.map ? `<span>${d.map}</span>` : '';
      const rounds = d.rounds_total ? `<span>${d.rounds_total} rund</span>` : '';
      const kills  = d.kills_total  ? `<span>${d.kills_total} zaб.</span>` : '';
      return `<div class="card" id="card-${d.id}">
        <div class="name">${d.filename||d.stored_as}</div>
        <div class="meta">
          <span class="pill ${status}">${statusLabel}</span>
          <span>${fmtSize(d.size_bytes)}</span>
          <span>${fmtTime(d.uploaded_at)}</span>
          ${extra}${rounds}${kills}
        </div>
        <div class="actions">
          <button class="btn primary" id="parse-${d.id}" ${canParse?'':'disabled'}
            onclick="startParse('${d.id}', this)">
            ${status==='running'?'analizuję…':'analizuj'}
          </button>
          <button class="btn" id="report-${d.id}" ${canReport?'':'disabled'}
            onclick="toggleReport('${d.id}', this, document.getElementById('report-${d.id}-panel'))">
            pokaż raport
          </button>
          <a class="btn" href="/api/demos/${d.id}/download">pobierz</a>
        </div>
        <div class="report" id="report-${d.id}-panel"></div>
      </div>`;
    }).join('');

    // Jeśli któreś demo jest w trakcie parsowania — automatyczny polling
    demos.filter(d=>d.parse_status==='running').forEach(d=>{
      const interval = setInterval(async()=>{
        const meta = await fetch('/api/demos/'+d.id).then(r=>r.json());
        if(meta.parse_status!=='running'){ clearInterval(interval); loadList(); }
      }, 2000);
    });
  }catch(err){
    listEl.innerHTML='<div class="empty">Nie mogę pobrać listy — czy serwer działa?</div>';
  }
}

document.getElementById('reload').addEventListener('click', loadList);
loadList();
</script>
</body>
</html>
