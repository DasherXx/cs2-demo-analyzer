<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CS2 Demo — magazyn</title>
<style>
  :root{
    --bg:#11131a; --panel:#181b24; --panel-2:#1f2330;
    --line:#2a2f3e; --text:#e7e9ef; --muted:#8b90a0;
    --accent:#5b7cff; --accent-ink:#0b1020; --good:#3ecf8e; --warn:#e0a23c;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5}
  .wrap{max-width:680px;margin:0 auto;padding:28px 18px 64px}
  header{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  h1{font-size:20px;font-weight:600;margin:0;letter-spacing:-.01em}
  .tag{font-family:var(--mono);font-size:11px;color:var(--accent);border:1px solid var(--line);
       padding:2px 7px;border-radius:6px}
  .sub{color:var(--muted);font-size:13px;margin:0 0 22px}

  .bay{border:1.5px dashed var(--line);border-radius:14px;background:var(--panel);
       padding:30px 20px;text-align:center;transition:border-color .15s,background .15s;cursor:pointer}
  .bay:hover{border-color:var(--accent)}
  .bay.drag{border-color:var(--accent);background:var(--panel-2)}
  .bay strong{display:block;font-size:15px;margin-bottom:4px}
  .bay span{color:var(--muted);font-size:13px}
  input[type=file]{display:none}

  .status{min-height:20px;margin:14px 2px;font-size:13px;font-family:var(--mono)}
  .status.ok{color:var(--good)} .status.err{color:var(--warn)} .status.busy{color:var(--accent)}

  .head{display:flex;justify-content:space-between;align-items:center;margin:28px 2px 12px}
  .head h2{font-size:14px;font-weight:600;margin:0;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .reload{background:none;border:1px solid var(--line);color:var(--muted);font-size:12px;
          padding:5px 11px;border-radius:7px;cursor:pointer;font-family:var(--mono)}
  .reload:hover{color:var(--text);border-color:var(--accent)}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px}
  .card .name{font-size:15px;font-weight:500;word-break:break-all}
  .meta{display:flex;flex-wrap:wrap;gap:6px 14px;margin:9px 0;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .type{color:var(--good)}
  .type.warn{color:var(--warn)}
  .actions{display:flex;gap:8px;margin-top:6px}
  .actions a,.actions button{font-family:var(--mono);font-size:12px;text-decoration:none;
       border:1px solid var(--line);color:var(--text);background:none;padding:6px 12px;border-radius:7px;cursor:pointer}
  .actions a:hover,.actions button:hover{border-color:var(--accent);color:var(--accent)}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:26px;border:1px dashed var(--line);border-radius:12px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>CS2 Demo — magazyn</h1>
    <span class="tag">krok 1</span>
  </header>
  <p class="sub">Wrzuć plik <code>.dem</code> (lub <code>.dem.zst</code>) z peceta. Pojawi się na liście — także na telefonie w tej samej sieci.</p>

  <div class="bay" id="bay">
    <strong>Upuść demo tutaj</strong>
    <span>albo dotknij, żeby wybrać plik</span>
    <input type="file" id="file" accept=".dem,.zst,.gz,.bz2">
  </div>
  <div class="status" id="status"></div>

  <div class="head">
    <h2>Wgrane dema</h2>
    <button class="reload" id="reload">odśwież</button>
  </div>
  <div id="list"></div>
</div>

<script>
  const bay = document.getElementById('bay');
  const fileInput = document.getElementById('file');
  const statusEl = document.getElementById('status');
  const listEl = document.getElementById('list');

  function setStatus(msg, kind){ statusEl.textContent = msg; statusEl.className = 'status ' + (kind||''); }
  function fmtSize(b){
    if(b < 1024) return b + ' B';
    if(b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(1) + ' MB';
  }
  function fmtTime(iso){ try { return new Date(iso).toLocaleString('pl-PL'); } catch(e){ return iso; } }

  async function upload(file){
    if(!file) return;
    setStatus('Wysyłam ' + file.name + ' …', 'busy');
    const fd = new FormData();
    fd.append('file', file);
    try{
      const res = await fetch('/api/demos', { method:'POST', body: fd });
      if(!res.ok) throw new Error('Serwer odrzucił plik (' + res.status + ')');
      const meta = await res.json();
      setStatus('Gotowe — rozpoznano: ' + meta.type, 'ok');
      loadList();
    }catch(err){
      setStatus('Nie udało się: ' + err.message, 'err');
    }
  }

  bay.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => upload(e.target.files[0]));
  bay.addEventListener('dragover', e => { e.preventDefault(); bay.classList.add('drag'); });
  bay.addEventListener('dragleave', () => bay.classList.remove('drag'));
  bay.addEventListener('drop', e => {
    e.preventDefault(); bay.classList.remove('drag');
    upload(e.dataTransfer.files[0]);
  });

  function copyLink(id){
    const url = location.origin + '/api/demos/' + id + '/download';
    navigator.clipboard?.writeText(url);
    setStatus('Skopiowano link do dema', 'ok');
  }

  async function loadList(){
    try{
      const res = await fetch('/api/demos');
      const demos = await res.json();
      if(!demos.length){ listEl.innerHTML = '<div class="empty">Pusto. Wrzuć pierwsze demo powyżej.</div>'; return; }
      listEl.innerHTML = demos.map(d => {
        const warn = d.type.includes('nieznany') ? ' warn' : '';
        return `<div class="card">
          <div class="name">${d.filename || d.stored_as}</div>
          <div class="meta">
            <span class="type${warn}">${d.type}</span>
            <span>${fmtSize(d.size_bytes)}</span>
            <span>${fmtTime(d.uploaded_at)}</span>
          </div>
          <div class="actions">
            <a href="/api/demos/${d.id}/download">pobierz</a>
            <button onclick="copyLink('${d.id}')">kopiuj link</button>
          </div>
        </div>`;
      }).join('');
    }catch(err){
      listEl.innerHTML = '<div class="empty">Nie mogę pobrać listy — czy serwer działa?</div>';
    }
  }

  document.getElementById('reload').addEventListener('click', loadList);
  loadList();
</script>
</body>
</html>
